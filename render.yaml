services:
  - type: worker
    name: wingman-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter  # $7/mo — keeps the bot alive 24/7 (free plan sleeps)
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: "true"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-preview-04-17
      - key: DB_PATH
        value: ./data/wingman.db
      - key: DM_SCORE_THRESHOLD
        value: "4.0"
      - key: PORT
        value: "8080"
      # ── Secrets (set in Render dashboard, NOT in yaml) ──
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
