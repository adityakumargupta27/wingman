services:
  - type: web
    name: wingman-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: wingman-data
      mountPath: /usr/src/app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: "true"
      - key: AI_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: DB_PATH
        value: /usr/src/app/data/wingman.db
      - key: PORT
        value: "8080"
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
